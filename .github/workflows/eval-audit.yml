name: Audit eval gate (zero false positives)
on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 5 * * 1"   # weekly Monday 05:30
jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - name: ENV_B64 lint
        env:
          ENV_B64: ${{ secrets.ENV_B64 }}
        run: bash scripts/lint-env.sh || true
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --quiet -r requirements.txt
      - run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Run audit eval (fails on any benchmark breach)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/heartbeat.js wrap eval-audit -- node scripts/eval-audit.mjs
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/notify-workflow-failure.sh "${{ github.workflow }}" "${{ github.run_id }}" || true
