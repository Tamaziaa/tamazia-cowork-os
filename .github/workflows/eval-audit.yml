name: Audit eval gate (zero false positives)
on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 5 * * 1"   # weekly Monday 05:30
jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --quiet -r requirements.txt
      - run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Run audit eval (fails on any benchmark breach)
        run: |
          set -a; source .env 2>/dev/null; set +a
          node scripts/heartbeat.js wrap eval-audit -- node scripts/eval-audit.mjs
