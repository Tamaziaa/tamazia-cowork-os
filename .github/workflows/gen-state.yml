name: gen-state (regenerate PIPELINE-STATE.md)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/PIPELINE-STATE.md'   # never re-trigger on our own commit
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}
permissions:
  contents: write

# Single-flight: this commits + pushes docs/PIPELINE-STATE.md to main. Two concurrent runs (push-trigger +
# cron + dispatch can all coincide) would race the git push to main; serialise so only one writes at a time.
concurrency:
  group: gen-state
  cancel-in-progress: false
jobs:
  gen-state:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install --omit=dev || npm install || true
      - run: python -m pip install --quiet -r requirements.txt
      - run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Ensure schema (provision system_state etc; additive-only, fail-open)
        # A5: gen-state.js persists the digest into system_state. This workflow never provisioned that table
        # (no ensure-schema.js, no CREATE), so on a DB where system_state was absent the digest INSERT errored and
        # was swallowed — the digest persisted 0 bytes while the run looked green. ensure-schema.js is additive-only,
        # uses only Node built-ins + Neon HTTP (no npm needed), and always exits 0, so it can never break this job.
        # continue-on-error: true is belt-and-braces on top of || true — a transient PATH issue (e.g. GitHub
        # runner Node.js migration) can cause exit 127 even with || true when bash -e is active.
        continue-on-error: true
        run: |
          set -a; source .env 2>/dev/null; set +a
          node scripts/ensure-schema.js || true
      - run: |
          set -a; source .env 2>/dev/null; set +a
          # O4 [A1/A61/A64]: heartbeat-wrap so this scheduled health-surface generator is visible in engine_runs
          # (engine_health / check-stuck-jobs). Fallback to a bare call so a heartbeat hiccup never blocks the state file.
          node scripts/heartbeat.js wrap gen-state -- node scripts/gen-state.js || node scripts/gen-state.js
      - name: Commit if changed (best-effort; Neon holds the digest regardless)
        continue-on-error: true
        run: |
          set -a; source .env 2>/dev/null; set +a
          git config user.name "tamazia-bot"
          git config user.email "bot@tamazia.co.uk"
          git add docs/PIPELINE-STATE.md
          git diff --cached --quiet && { echo "no change"; exit 0; }
          git commit -m "chore(state): regenerate PIPELINE-STATE.md [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/Tamaziaa/tamazia-cowork-os.git" HEAD:main
