name: gen-state (regenerate PIPELINE-STATE.md)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/PIPELINE-STATE.md'   # never re-trigger on our own commit
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}
permissions:
  contents: write

# Single-flight: this commits + pushes docs/PIPELINE-STATE.md to main. Two concurrent runs (push-trigger +
# cron + dispatch can all coincide) would race the git push to main; serialise so only one writes at a time.
concurrency:
  group: gen-state
  cancel-in-progress: false
jobs:
  gen-state:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      # FIRST gate: fail LOUDLY + EARLY if ENV_B64 is malformed (the `City: London` class of bug — a line with
      # no '=' before the first space). The safe per-line loader stops such a line from CRASHING the run, but it
      # then SILENTLY drops the variable and a downstream script fails far away with a confusing NULL. This lints
      # the decoded secret directly (no .env on disk yet) and exits 1 with the exact offending line — never a
      # silent exit 127. Runs before setup-node/python so a bad secret is caught in seconds.
      - name: "Lint ENV_B64 (catch malformed secret early - the City London guard)"
        env:
          ENV_B64: ${{ secrets.ENV_B64 }}
        run: bash scripts/lint-env.sh
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install --omit=dev || npm install || true
      - run: python -m pip install --quiet -r requirements.txt
      - run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Ensure schema (provision system_state etc; additive-only, fail-open)
        # A5: gen-state.js persists the digest into system_state. This workflow never provisioned that table
        # (no ensure-schema.js, no CREATE), so on a DB where system_state was absent the digest INSERT errored and
        # was swallowed — the digest persisted 0 bytes while the run looked green. ensure-schema.js is additive-only,
        # uses only Node built-ins + Neon HTTP (no npm needed), and always exits 0, so it can never break this job.
        # continue-on-error: true is belt-and-braces on top of || true — a transient PATH issue (e.g. GitHub
        # runner Node.js migration) can cause exit 127 even with || true when bash -e is active.
        continue-on-error: true
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/ensure-schema.js || true
      - name: Generate PIPELINE-STATE (heartbeat-wrapped, retry-once on transient failure)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          # O4 [A1/A61/A64]: heartbeat-wrap so this scheduled health-surface generator is visible in engine_runs
          # (engine_health / check-stuck-jobs). Fallback to a bare call so a heartbeat hiccup never blocks the state file.
          run_once() { node scripts/heartbeat.js wrap gen-state -- node scripts/gen-state.js || node scripts/gen-state.js; }
          # Retry-once: a Neon cold-start / transient HTTP blip is the common cause of a one-off failure here.
          # Try, and if it returns non-zero, wait briefly and try a SECOND time before letting the step fail.
          if ! run_once; then
            echo "gen-state: first attempt failed — retrying once after 10s (transient Neon/HTTP guard)…" >&2
            sleep 10
            run_once
          fi
      - name: Commit if changed (best-effort; Neon holds the digest regardless)
        continue-on-error: true
        env:
          # The push targets main via x-access-token:${GH_TOKEN}. GH_TOKEN was never set in this job's env, so
          # it relied entirely on a GH_TOKEN= line existing in ENV_B64; fall back to the built-in GITHUB_TOKEN
          # (which has contents:write here) so the push works regardless. continue-on-error keeps a push hiccup
          # from failing the job — Neon holds the digest either way.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          git config user.name "tamazia-bot"
          git config user.email "bot@tamazia.co.uk"
          git add docs/PIPELINE-STATE.md
          git diff --cached --quiet && { echo "no change"; exit 0; }
          git commit -m "chore(state): regenerate PIPELINE-STATE.md [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/Tamaziaa/tamazia-cowork-os.git" HEAD:main

      # Self-heal: post the REAL error to Telegram + Slack if any step failed. Fail-open + `|| true`.
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/notify-workflow-failure.sh "${{ github.workflow }}" "${{ github.run_id }}" || true
