name: Deliverability guard (weekly SPF/DKIM/DMARC + Postmaster)
# P2-7 · Weekly DNS check of every sending domain (SPF/DKIM/DMARC alignment + Google Postmaster connection).
# Flags any misconfigured domain to the daily digest + a realtime alert. Read-only DNS over HTTPS.
on:
  schedule:
    - cron: '20 6 * * 1'   # weekly Monday 06:20 UTC
  workflow_dispatch: {}

concurrency:
  group: engine-db-work
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - name: ENV_B64 lint
        env:
          ENV_B64: ${{ secrets.ENV_B64 }}
        run: bash scripts/lint-env.sh || true
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - name: Install deps
        run: npm install --omit=dev || npm install || true
      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Run deliverability guard (alerts on any SPF/DKIM/DMARC/Postmaster gap)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/heartbeat.js wrap deliverability-guard -- node scripts/deliverability-guard.js || node scripts/deliverability-guard.js || true
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/notify-workflow-failure.sh "${{ github.workflow }}" "${{ github.run_id }}" || true
