name: Rebuild ENV_B64
on:
  workflow_dispatch:

jobs:
  update-env:
    runs-on: ubuntu-latest
    steps:
      - name: Append new vars and update ENV_B64 via API
        env:
          CURRENT_ENV: ${{ secrets.ENV_B64 }}
          GH_TOKEN_PAT: ${{ secrets.GH_ACTIONS_PAT }}
          GH_DEPLOY_PAT: ${{ secrets.GH_DEPLOY_PAT }}
        run: |
          pip install PyNaCl -q
          
          echo "$CURRENT_ENV" | base64 -d > current.env
          echo "Current line count: $(wc -l < current.env)"
          
          grep -v "^NOTION_LEADS_DB_ID=" current.env | \
          grep -v "^CAL_WEBHOOK_SECRET=" | \
          grep -v "^PUBLIC_POSTHOG_KEY=" | \
          grep -v "^PUBLIC_POSTHOG_HOST=" | \
          grep -v "^GH_PAT=" > updated.env 2>/dev/null || cp current.env updated.env
          
          echo "NOTION_LEADS_DB_ID=02e175e995a640bba0be8234c5bebb6f" >> updated.env
          echo "CAL_WEBHOOK_SECRET=0bee0b0cf2ec2afc70e718dc8d92b29331a5f299810a5b7c039d8efcb2a2c51a" >> updated.env
          echo "PUBLIC_POSTHOG_KEY=phc_pomkfksdN8yRV4hUfNnqkgBLwHXpxxVsQFq4KpugkAr4" >> updated.env
          echo "PUBLIC_POSTHOG_HOST=https://eu.i.posthog.com" >> updated.env
          printf "GH_PAT=%s\n" "$GH_DEPLOY_PAT" >> updated.env
          
          echo "Updated line count: $(wc -l < updated.env)"
          
          python3 - << 'EOF'
import base64, json, urllib.request, os
from nacl import encoding, public

pat = os.environ['GH_TOKEN_PAT']

# Read updated.env and encode
with open('updated.env', 'rb') as f:
    env_content = f.read()
new_b64 = base64.b64encode(env_content).decode().replace('\n', '')
print(f"New ENV_B64 length: {len(new_b64)} chars")

# Get repo public key
req = urllib.request.Request(
    'https://api.github.com/repos/Tamaziaa/tamazia-cowork-os/actions/secrets/public-key',
    headers={'Authorization': f'token {pat}', 'Accept': 'application/vnd.github+json'}
)
pk_data = json.load(urllib.request.urlopen(req))
key_id = pk_data['key_id']
pub_key_b64 = pk_data['key']
print(f"Got public key: {key_id}")

# Encrypt the new ENV_B64 value
public_key = public.PublicKey(pub_key_b64.encode('utf-8'), encoding.Base64Encoder())
sealed_box = public.SealedBox(public_key)
encrypted = sealed_box.encrypt(new_b64.encode('utf-8'))
encrypted_b64 = base64.b64encode(encrypted).decode('utf-8')

# Update the secret via API
payload = json.dumps({'encrypted_value': encrypted_b64, 'key_id': key_id}).encode()
update_req = urllib.request.Request(
    'https://api.github.com/repos/Tamaziaa/tamazia-cowork-os/actions/secrets/ENV_B64',
    data=payload, method='PUT',
    headers={'Authorization': f'token {pat}', 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json'}
)
try:
    r = urllib.request.urlopen(update_req)
    print(f'SUCCESS: ENV_B64 updated, status {r.status}')
except urllib.error.HTTPError as e:
    print(f'Error: {e.code} {e.read().decode()}')
EOF
