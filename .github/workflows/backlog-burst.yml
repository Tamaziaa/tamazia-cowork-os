# Backlog burst · founder-dispatched big-batch pipeline advance (NO SENDING).
# Runs the same pipeline steps as the engine cycle with large limits so the
# 2,590-deep pending/sourced backlog moves to email-ready without waiting for
# 12-per-cycle drips. send-due.js is deliberately NOT here: this workflow can
# never send mail regardless of system_state (defence in depth on top of paused=true).
name: Backlog burst (no-send pipeline advance)

on:
  workflow_dispatch:
    inputs:
      resolve:
        description: 'resolve-domains batch'
        default: '100'
      enrich:
        description: 'enrich batch'
        default: '60'
      scrape:
        description: 'scrape-intel batch'
        default: '60'
      verify:
        description: 'verify-contacts batch'
        default: '150'
      qualify:
        description: 'qualify-and-queue batch'
        default: '300'
      mint:
        description: 'build-audit-pages batch'
        default: '25'

concurrency:
  group: engine-db-work
  cancel-in-progress: false

jobs:
  burst:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node deps
        run: npm install --omit=dev || npm install || true
      - name: Install Python deps (pg8000 for DB shim)
        run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env from secret
        run: |
          echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Schema + CC-2 provision (idempotent, additive-only)
        run: |
          node scripts/ensure-schema.js
          node scripts/cc2-provision.js
      - name: Advance the backlog (no-send)
        run: |
          set -a; source .env; set +a
          node scripts/resolve-domains.js ${{ inputs.resolve }}        || true
          node scripts/enrich-and-queue-channels.js ${{ inputs.enrich }} || true
          node scripts/scrape-intel.js ${{ inputs.scrape }}            || true
          node scripts/verify-contacts.js ${{ inputs.verify }}         || true
          node scripts/dedupe-leads.js                                  || true
          node scripts/qualify-and-queue.js ${{ inputs.qualify }}       || true
          node scripts/build-audit-pages.js ${{ inputs.mint }}          || true
      - name: Funnel summary
        run: |
          set -a; source .env; set +a
          node -e '
            const q = async (sql) => {
              const host = process.env.NEON_URL.replace(/.*@([^/]+)\/.*/, "$1");
              const r = await fetch("https://" + host + "/sql", { method: "POST",
                headers: { "Neon-Connection-String": process.env.NEON_URL, "Content-Type": "application/json" },
                body: JSON.stringify({ query: sql, params: [] }) });
              return (await r.json()).rows || [];
            };
            (async () => {
              console.log("stage counts:", JSON.stringify(await q("SELECT lifecycle_stage, count(*)::int n FROM leads GROUP BY 1 ORDER BY 2 DESC")));
              console.log("email-ready Tier-1:", JSON.stringify(await q("SELECT count(*)::int n FROM leads WHERE lifecycle_stage=$$qualified$$ AND audit_url IS NOT NULL")));
              console.log("mint queue:", JSON.stringify(await q("SELECT status, count(*)::int n FROM minting_queue GROUP BY 1")));
              console.log("icp_catalog:", JSON.stringify(await q("SELECT count(*)::int n FROM icp_catalog")));
            })().catch(e => console.error(e.message));
          '
