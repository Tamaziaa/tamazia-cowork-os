# Backlog burst · founder-dispatched big-batch pipeline advance (NO SENDING).
# Runs the same pipeline steps as the engine cycle with large limits so the
# 2,590-deep pending/sourced backlog moves to email-ready without waiting for
# 12-per-cycle drips. send-due.js is deliberately NOT here: this workflow can
# never send mail regardless of system_state (defence in depth on top of paused=true).
name: Backlog burst (no-send pipeline advance)

on:
  workflow_dispatch:
    inputs:
      requalify:
        description: 're-score EXISTING leads through current Tier-1 criteria (pending/tier2/3/rejected)'
        default: '500'
      enrich:
        description: 'enrich batch (website+emails+socials)'
        default: '60'
      research:
        description: 'deep-research / site-scrape batch'
        default: '40'
      verify:
        description: 'verify-contacts batch'
        default: '150'
      qualify:
        description: 'qualify-and-queue batch (fresh unscored leads)'
        default: '300'
      mint:
        description: 'enqueue + mint batch (build audit_pages, set audit_url)'
        default: '200'

concurrency:
  group: engine-db-work
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  burst:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Node deps
        run: npm install --omit=dev || npm install || true
      - name: Install Python deps (pg8000 for DB shim)
        run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env from secret
        run: |
          echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Schema + CC-2 provision (idempotent, additive-only)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/ensure-schema.js
          node scripts/v3/migrate-v3-schema.js || true   # guarantee requal_version + v3 cols before requalify (canonical-schema now also carries them; this is belt-and-suspenders)
          node scripts/cc2-provision.js
      - name: Re-qualify the existing pile (current Tier-1 criteria)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          # Heartbeat the re-tier pass too (the advance step below is already wrapped). Keeps backlog-burst visible
          # to the engine-cycle race guard (heartbeat.js active-writer) during requalify, which rewrites the same
          # tier/lifecycle columns the cycle's qualify->mint seam touches.
          export HEARTBEAT_WRAP_TIMEOUT_MS=3300000  # 55 min: backlog-burst job = 120 min; 2 wraps max; 55+55<120
          node scripts/heartbeat.js wrap backlog-burst -- node scripts/requalify-all-leads.js ${{ inputs.requalify }} || true
      - name: Advance the backlog (no-send)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/heartbeat.js wrap backlog-burst -- bash -c '
            node scripts/enrich-and-queue-channels.js ${{ inputs.enrich }} || true
            node scripts/run-deep-research-batch.js ${{ inputs.research }} || true
            node scripts/verify-contacts.js ${{ inputs.verify }}         || true
            node scripts/dedupe-leads.js                                  || true
            node scripts/qualify-and-queue.js ${{ inputs.qualify }}       || true
            node scripts/enqueue-leads.js ${{ inputs.mint }}             || true
            node scripts/mint-worker.js --once                            || true
          ' || true   # outer guard: a heartbeat-wrap timeout (exit 124 on a large burst, e.g. verify=400) must NOT fail this best-effort no-send drain — partial progress is kept (matches the requalify step's guard)
      - name: Funnel summary
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node -e '
            const q = async (sql) => {
              const host = process.env.NEON_URL.replace(/.*@([^/]+)\/.*/, "$1");
              const r = await fetch("https://" + host + "/sql", { method: "POST",
                headers: { "Neon-Connection-String": process.env.NEON_URL, "Content-Type": "application/json" },
                body: JSON.stringify({ query: sql, params: [] }) });
              return (await r.json()).rows || [];
            };
            (async () => {
              console.log("stage counts:", JSON.stringify(await q("SELECT lifecycle_stage, count(*)::int n FROM leads GROUP BY 1 ORDER BY 2 DESC")));
              console.log("email-ready Tier-1:", JSON.stringify(await q("SELECT count(*)::int n FROM leads WHERE lifecycle_stage=$$qualified$$ AND audit_url IS NOT NULL")));
              console.log("mint queue:", JSON.stringify(await q("SELECT status, count(*)::int n FROM minting_queue GROUP BY 1")));
              console.log("icp_catalog:", JSON.stringify(await q("SELECT count(*)::int n FROM icp_catalog")));
            })().catch(e => console.error(e.message));
          '
