name: Register sourcing (daily, regulated registers)
# ADDITIVE Tier-1 supply. Runs the REGULATED-REGISTER adapters (companies-house, cqc, fca,
# charity-commission) through the SAME unchanged gated pipeline source-leads.js uses (gather -> ICP
# pre-filter -> full audit -> scoreICP+hot -> enrich -> persist -> sourcing_runs), via the SEPARATE runner
# scripts/source-registers.js (the existing scrapers.yml / source-leads.js path is untouched). Regulated
# registers = the ICP by construction, so this is the highest-purity Tier-1 sourcing.
#
# Companies House uses the ADVANCED SEARCH API (SIC + company_status=active) for precise regulated-firm
# sourcing (D2.4); the keyless public-page keyword path remains as fallback. CQC/FCA are wrapped in a
# retry/health guard so a 5xx/403/timeout returns [] (fail-open) and they AUTO-ACTIVATE the moment the API
# returns 200 with a real key present (both were 500-ing server-side / 403 without a key on 2026-06-16).
# Charity Commission is wired here too (D2.4): keyed official register API (CHARITY_COMMISSION_API_KEY,
# auto-activates on key landing) with the keyless internal search as fallback — both fail-open.
#
# SOURCE_T1_TARGET=100 per register: each register stops once it has yielded 100 candidates that pass the
# Tier-1 ICP pre-filter (equal allocation). raw --max is generous (300) so the eligibility-stop governs.
# Each adapter is fail-open: a register API outage yields 0 for that source and never wedges the run.
# SEND stays OFF — this only sources/qualifies.
on:
  schedule:
    - cron: "30 6 * * *"   # daily 06:30 UTC (offset from scrapers.yml 07:00 so they don't contend)
  workflow_dispatch:
    inputs:
      sources: { description: "comma register sources", default: "companies-house,cqc,fca,charity-commission" }
      max: { description: "raw max leads/source (eligibility-stop, not this, governs)", default: "300" }
      t1_target: { description: "Tier-1-eligible stop per register (equal allocation)", default: "100" }

concurrency: { group: register-sourcing, cancel-in-progress: false }

jobs:
  source:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # 35-min heartbeat cap (default is 20m which is too short for CH+charity full-pipeline at 100 leads).
      # Source-registers runs scanSite+enrichCompany per lead serially; 50 leads × ~10s = ~8min + API fetch.
      # 35m gives margin while staying under the 40m job timeout.
      HEARTBEAT_WRAP_TIMEOUT_MS: "2100000"
      # Cap Tier-1 target per source at 50 (was 100 via SOURCE_T1_TARGET default) to halve runtime.
      # At 50 Tier-1 candidates × ~10s each ≈ 8min for CH + 8min for charity = ~16min total, fits in 35m.
      SOURCE_T1_TARGET: "50"
    steps:
      - uses: actions/checkout@v4
      - name: ENV_B64 lint
        env:
          ENV_B64: ${{ secrets.ENV_B64 }}
        run: bash scripts/lint-env.sh || true
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps (pg8000 shim)
        run: |
          python -m pip install --quiet -r requirements.txt || true
          npm install --omit=dev || true
      - name: Materialise .env from secret
        run: |
          echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
          if ! grep -q '^PAGESPEED_API_KEY=' .env && [ -n "${{ secrets.PAGESPEED_API_KEY }}" ]; then echo "PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}" >> .env; fi
      - name: Run register sourcing (gated, heartbeat-wrapped)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          # Pin heartbeat + T1 target AFTER .env export (which may carry the old 20-min default)
          export HEARTBEAT_WRAP_TIMEOUT_MS="2100000"
          export SOURCE_T1_TARGET="${{ github.event.inputs.t1_target || '50' }}"
          node scripts/heartbeat.js wrap source-registers -- node scripts/source-registers.js --source ${{ github.event.inputs.sources || 'companies-house,cqc,fca,charity-commission' }} --max ${{ github.event.inputs.max || '300' }}
      - name: Alert on failure
        if: failure()
        run: |
          set +e; source .env 2>/dev/null
          [ -n "$TELEGRAM_BOT_TOKEN" ] && curl -s --max-time 15 -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" -d chat_id="$TELEGRAM_CHAT_ID" -d text="🔴 register-sourcing run failed (run ${{ github.run_id }})." >/dev/null || true
