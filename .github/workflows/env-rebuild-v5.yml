name: ENV secret rebuild v5
on:
  workflow_dispatch:
jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Rebuild ENV_B64
        env:
          CURRENT_ENV: ${{ secrets.ENV_B64 }}
          GH_TOKEN_PAT: ${{ secrets.GH_ACTIONS_PAT }}
          GH_DEPLOY_PAT: ${{ secrets.GH_DEPLOY_PAT }}
        run: |
          pip install PyNaCl -q

          echo "$CURRENT_ENV" | base64 -d > current.env
          echo "Lines before: $(wc -l < current.env)"

          grep -v "^NOTION_LEADS_DB_ID=" current.env \
            | grep -v "^CAL_WEBHOOK_SECRET=" \
            | grep -v "^PUBLIC_POSTHOG_KEY=" \
            | grep -v "^PUBLIC_POSTHOG_HOST=" \
            | grep -v "^GH_PAT=" > updated.env 2>/dev/null || cp current.env updated.env

          echo "NOTION_LEADS_DB_ID=02e175e995a640bba0be8234c5bebb6f" >> updated.env
          echo "CAL_WEBHOOK_SECRET=0bee0b0cf2ec2afc70e718dc8d92b29331a5f299810a5b7c039d8efcb2a2c51a" >> updated.env
          echo "PUBLIC_POSTHOG_KEY=phc_pomkfksdN8yRV4hUfNnqkgBLwHXpxxVsQFq4KpugkAr4" >> updated.env
          echo "PUBLIC_POSTHOG_HOST=https://eu.i.posthog.com" >> updated.env
          printf 'GH_PAT=%s\n' "$GH_DEPLOY_PAT" >> updated.env
          echo "Lines after: $(wc -l < updated.env)"

          echo "" | base64 -d > /tmp/push_secret.py
          python3 /tmp/push_secret.py
