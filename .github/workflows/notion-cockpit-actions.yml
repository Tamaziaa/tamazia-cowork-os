name: Notion cockpit actions (Accept/Reject → Neon)
# Two-way cockpit bridge: polls the Notion Leads Cockpit DB for pages tagged
# "Accept" or "Reject" in the "Review Action" select property, writes the
# verdict into Neon (leads.review_status='accepted'/'rejected'), and clears
# the tag so the loop does not repeat.
#
# After this runs, scripts/apply-review.js (apply-review.yml, every 30 min)
# picks up the new 'accepted'/'rejected' rows and promotes/parks them
# atomically through the canonical gate (PECR + scoreLead). SEND stays OFF.
#
# Prerequisites (set in ENV_B64 or as GitHub secrets):
#   NOTION_API_KEY     — Notion integration token (ntn_...)
#   NOTION_LEADS_DB_ID — 32-hex or UUID ID of the Leads Cockpit database in Notion
#   NEON_URL           — Neon connection string
#
# If NOTION_LEADS_DB_ID is not set the script exits cleanly with a skip message
# so this workflow never reds on an unconfigured secret.

on:
  schedule:
    # Every 5 minutes, staggered off :00/:30 (used by engine-cycle/notion-sync)
    # and off :07/:37 (apply-review). Firing at :03/:08/... keeps clear of all three.
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch: {}

concurrency:
  group: notion-cockpit-actions
  cancel-in-progress: false   # queue, never cancel — every verdict matters

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node deps
        run: npm install --omit=dev || npm install || true

      - name: Install Python deps (pg8000 psql shim)
        run: python -m pip install --quiet -r requirements.txt

      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env

      - name: DB preflight (fail loud on dead Neon)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/db-preflight.js

      - name: Sync Notion Accept/Reject tags → Neon review_status
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/notion-accept-reject.js
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/notify-workflow-failure.sh "${{ github.workflow }}" "${{ github.run_id }}" || true
