name: Lead scrapers (daily, gated)
# Runs the FULL free-DIY adapter set through the SAME gated pipeline (gather -> ICP pre-filter -> full audit ->
# ICP+hot score -> enrich -> persist -> sourcing_runs tracking). Sources: serp-top, maps, jobspy run autonomously
# (api mode, free-first via serp-client); reddit/youtube/x-ads/social-ads are chrome-mode and fail-open to 0
# until a free API token / --capture is supplied (they cost nothing to list and go live the moment a key lands).
# WS5 equal-allocation cap: SOURCE_T1_TARGET (default 50) stops EACH source once it has yielded 50 leads that
# pass the Tier-1 ICP pre-filter — equal allocation per source. The raw --max is deliberately generous (200) so
# the eligibility-stop, not the raw cap, governs. Self-healing: each source fail-open; a bad source never wedges
# the run. Quality gates in src/lib/sourcing/icp.js keep the list HOT. Register sources (companies_house_uk,
# sec_edgar, opencorporates, osm_overpass, gleif) are sourced by the S028 orchestrator on its own cron, not here.
on:
  schedule:
    - cron: "0 7 * * *"   # daily 07:00 UTC
  workflow_dispatch:
    inputs:
      sources: { description: "comma sources (full DIY adapter set)", default: "serp-top,maps,jobspy,reddit,youtube,x-ads,social-ads" }
      max: { description: "raw max leads/source (eligibility-stop, not this, governs)", default: "200" }
      t1_target: { description: "Tier-1-eligible stop per source (equal allocation)", default: "50" }

concurrency: { group: lead-scrapers, cancel-in-progress: false }

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps (pg8000 shim + JobSpy)
        run: |
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet python-jobspy
          npm install --omit=dev || true
      - name: Materialise .env from secret
        run: |
          echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
          if ! grep -q '^PAGESPEED_API_KEY=' .env && [ -n "${{ secrets.PAGESPEED_API_KEY }}" ]; then echo "PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}" >> .env; fi
      - name: Run gated scrapers
        env:
          # heartbeat.js default wrap timeout = 20 min (1200000 ms). The scraper run regularly
          # approaches 20 min, causing the heartbeat wrapper to SIGKILL the child and exit 124.
          # Set to 35 min — safely below the 40-min job timeout — so the scraper always finishes.
          HEARTBEAT_WRAP_TIMEOUT_MS: "2100000"
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          export SOURCE_T1_TARGET="${{ github.event.inputs.t1_target || '50' }}"
          node scripts/heartbeat.js wrap scrapers -- node scripts/source-leads.js --source ${{ github.event.inputs.sources || 'serp-top,maps,jobspy,reddit,youtube,x-ads,social-ads' }} --max ${{ github.event.inputs.max || '200' }}
      - name: Alert on failure
        if: failure()
        run: |
          set +e; source .env 2>/dev/null
          [ -n "$TELEGRAM_BOT_TOKEN" ] && curl -s --max-time 15 -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" -d chat_id="$TELEGRAM_CHAT_ID" -d text="🔴 lead-scrapers run failed (run ${{ github.run_id }})." >/dev/null || true
