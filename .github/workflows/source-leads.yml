name: Source hot leads (on demand)
on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Comma sources: serp-top,reddit,youtube,x-ads,social-ads (or "all")'
        default: 'serp-top'
      max:
        description: 'Max leads to fully process'
        default: '25'

# Share the scrapers' group: this runs the SAME source-leads.js that scrapers.yml runs, so an on-demand
# dispatch must not run concurrently with the daily scrape (double-insert / duplicate-lead risk).
concurrency:
  group: lead-scrapers
  cancel-in-progress: false

jobs:
  source:
    runs-on: ubuntu-latest
    timeout-minutes: 40   # match scrapers.yml; bound a hung scraper so it can't pin a runner for the 6h default
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - name: ENV_B64 lint
        env:
          ENV_B64: ${{ secrets.ENV_B64 }}
        run: bash scripts/lint-env.sh || true
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Source leads
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          SRC='${{ github.event.inputs.source }}'
          if [ "$SRC" = "all" ]; then FLAG="--all"; else FLAG="--source $SRC"; fi
          # A4/IG2: heartbeat-wrap so this on-demand source run is visible in engine_runs
          # (engine_health / check-stuck-jobs). Fallback to a bare call so a heartbeat hiccup never blocks sourcing.
          node scripts/heartbeat.js wrap source-leads -- node scripts/source-leads.js $FLAG --max '${{ github.event.inputs.max }}' || node scripts/source-leads.js $FLAG --max '${{ github.event.inputs.max }}'
