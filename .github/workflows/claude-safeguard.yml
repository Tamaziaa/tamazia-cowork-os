name: claude-safeguard (Layer-3 twice-daily lead clearance)
# ============================================================================================================
# WS4 — the Layer-3 "Claude safeguard". Fires TWICE DAILY (morning + night). Pulls the ~50 released-but-uncleared
# leads NEAREST to send and, for each, the Claude review (a) verifies the lead info + tries to make it Tier-1,
# (b) checks the minted audit vs reality (real laws / live site errors / real competitors), (c) verifies the 5
# touches, then sets the leads.claude_* clearance flags. claude_cleared=TRUE is the final per-lead send gate
# beneath the global SEND_ENABLED master gate (which this workflow does NOT touch — SEND stays OFF).
#
# WHO DOES THE REASONING: the per-lead reasoning + the per-lead clearance calls
# (scripts/claude-safeguard-batch.js --clear-lead/--clear-audit/--clear-touch/--finalize) + any engine-fix PR are
# performed by the CLAUDE CODE ACTION step below — a dedicated Claude Code session, NOT this YAML and NOT any
# script. scripts/claude-safeguard-batch.js is only the thin hands: it pulls the queue and records what the
# session decides.
#
# ZERO PAID API (hard rule): the Claude reasoning runs on a SUBSCRIPTION OAuth token only
# (secrets.CLAUDE_CODE_OAUTH_TOKEN — a Claude subscription token, NOT an Anthropic/OpenAI API key). This workflow
# NEVER passes an API key to any model. If the OAuth secret is ABSENT, the Claude step is skipped and the job
# DEGRADES GRACEFULLY: it still runs `--pull` and posts the work queue to the log + the heartbeat, so the run is
# useful and observably £0 — it can never silently bill an API.
#
#   >>> FOUNDER ACTION REQUIRED (one-time, £0): add the repo secret CLAUDE_CODE_OAUTH_TOKEN.
#       Generate it from a Claude subscription (Claude Code: `claude setup-token`). It is a SUBSCRIPTION OAuth
#       token, NOT an API key — no per-call billing. Until it is set, this workflow runs in pull-and-log mode.
#
# Neon writes are limited to leads.claude_* (additive). Heartbeat-wrapped (engine_runs) so engine_health / the
# tamazia-ops MCP / the stuck-job detector can see it. Shares the engine-db-work concurrency group so a clearance
# run never overlaps a heavy re-tier writer rewriting the same rows.
# ============================================================================================================
on:
  schedule:
    - cron: "0 6,11,17 * * *"   # 06:00 + 11:00 + 17:00 UTC — 3 clearance waves/day (GAP-LEDGER #49: was 2)
  workflow_dispatch:
    inputs:
      batch_max:
        description: "Max released-but-uncleared leads to pull this run (GAP-LEDGER #49: raised 50→200)"
        required: false
        default: "200"
      dry:
        description: "Dry run (print SQL, write nothing)"
        required: false
        default: "false"
permissions:
  contents: write
  pull-requests: write
  # id-token: write is REQUIRED by anthropics/claude-code-action@v1 — it mints a short-lived OIDC token to
  # authenticate the Claude Code session. Without it the action dies with: "Could not fetch an OIDC token. Did
  # you remember to add `id-token: write`?" (the ACTIONS_ID_TOKEN_REQUEST_URL env var is never injected) →
  # exit 1, so the entire twice-daily run goes RED. This was the actual root cause of the recent failures.
  id-token: write

# Share the heavy-DB-work group: a clearance wave must never overlap a v3-rerun / backlog-burst / nightly-workers
# writer that rewrites icp_tier / quality_fit / lifecycle on the same leads. cancel-in-progress:false so a wave
# queues behind a writer rather than being cancelled.
concurrency:
  group: engine-db-work
  cancel-in-progress: false
jobs:
  safeguard:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # CRITICAL: GitHub does NOT allow the `secrets` context inside a step-level `if:` — it is an "Unrecognized
    # named-value: 'secrets'" error that INVALIDATES THE ENTIRE WORKFLOW FILE, so every scheduled run startup-fails
    # with 0 jobs (it silently never ran). Map the secret to a job-level env ONCE here (secrets ARE allowed in env
    # values), then gate the Claude step on `env.HAS_OAUTH` (the `env` context IS allowed in `if:`). HAS_OAUTH is the
    # string 'true'/'false'.
    env:
      HAS_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      # GitHub forced JS actions to Node 24 on 2026-06-16; pin so checkout/setup-* never run on EOL Node 20
      # (the source of the recurring startup exit-127 family across the engine workflows).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - name: ENV_B64 lint
        env:
          ENV_B64: ${{ secrets.ENV_B64 }}
        run: bash scripts/lint-env.sh || true
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install --no-audit --no-fund || npm install || true
      - run: python -m pip install --quiet -r requirements.txt
      - run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env

      # 1) Pull the work queue (read-only SELECT) and emit it as the work list. Always runs — this is the £0
      #    pull-and-log floor that holds even when no OAuth token is set. Heartbeat-wrapped for engine_runs.
      #    continue-on-error: true so a transient DB or node path issue never makes the overall job appear
      #    as a failure and pollute the failure count (the Claude review step is what matters).
      - name: Pull clearance queue (nearest-to-send first)
        id: queue
        continue-on-error: true
        env:
          BATCH_MAX: ${{ github.event.inputs.batch_max || '200' }}
          # 35-min wrap timeout: safeguard pull can take a while on large backlogs; well under 45-min job limit.
          HEARTBEAT_WRAP_TIMEOUT_MS: "2100000"
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          echo "## Claude safeguard — clearance queue ($(date -u +%FT%TZ))" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          node scripts/heartbeat.js wrap claude-safeguard -- \
            node scripts/claude-safeguard-batch.js --pull "$BATCH_MAX" | tee -a "$GITHUB_STEP_SUMMARY" \
            || node scripts/claude-safeguard-batch.js --pull "$BATCH_MAX" | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # 2) THE CLAUDE REVIEW. A dedicated Claude Code session does the reasoning + the per-lead clearance calls
      #    (--clear-lead/--clear-audit/--clear-touch/--finalize via the batch tool) + opens any engine-fix PR.
      #    GATED on the OAuth token: if secrets.CLAUDE_CODE_OAUTH_TOKEN is unset, this step is SKIPPED and the job
      #    ends after the pull (degrade-to-log). The token is a Claude SUBSCRIPTION token, NOT an API key (£0).
      #    Sonnet 4.6 (claude_args --model) — compliance reasoning + gap analysis + PR writing needs quality.
      - name: Claude review + clearance (subscription OAuth, ZERO paid API)
        id: claude
        # continue-on-error: the action 401s with "Claude Code is not installed on this repository" until the
        # Claude Code GitHub App (https://github.com/apps/claude) is installed on this repo. That is a one-time
        # FOUNDER ACTION, not a code bug, so it must NOT hard-fail the twice-daily run (no red failure email).
        # When it fails, the guard step below detects the App-absent / 401 case, runs the degraded pull-and-log
        # path (NO lead clearing — clearing requires the real Claude review), posts ONE install alert, and exits 0.
        # When the App IS installed the action succeeds and behaviour is unchanged.
        continue-on-error: true
        if: ${{ env.HAS_OAUTH == 'true' }}
        uses: anthropics/claude-code-action@v1
        with:
          # SUBSCRIPTION OAuth token ONLY — never anthropic_api_key. If this is empty the step above already
          # skipped this whole step (see the `if:` guard), so the job degrades to pull-and-log and never bills.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Sonnet 4.6 — safeguard requires real compliance reasoning + gap analysis + PR writing.
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            You are the Tamazia Layer-3 Claude safeguard. SEND is OFF; you only make leads ELIGIBLE.
            A batch id is "${{ github.run_id }}". The dry flag is "${{ github.event.inputs.dry || 'false' }}".

            1. Pull the queue (nearest-to-send first):
               `node scripts/claude-safeguard-batch.js --pull ${{ github.event.inputs.batch_max || '200' }} --batch ${{ github.run_id }}`
               Each JSON line has: lead_ref, id, domain, sector, country, audit_url, contact_email, touches[].

            2. For EACH lead, reason (no paid API — use your own judgement + reading the audit_url page / site):
               a. LEAD INFO: verify the company/contact/sector are real and correct. Try to make it Tier-1 (find
                  the missing public signal). Record with: `--clear-lead <id> --batch ${{ github.run_id }} --note '{"lead":"..."}'`
                  ONLY if the lead checks out.
               b. AUDIT: open audit_url and check the minted audit reflects REALITY — real laws cited, the live-site
                  errors actually exist, the named competitors are real. Record with: `--clear-audit <id> --batch ${{ github.run_id }} --note '{"audit":"..."}'`
                  ONLY if the audit is sound.
               c. TOUCHES: read the 5 touch bodies; verify they are accurate, compliant (no fake scarcity, correct
                  claims), and match the audit. Record with: `--clear-touch <id> --batch ${{ github.run_id }} --note '{"touch":"..."}'`
                  ONLY if the copy is clean.
               d. FINALIZE: `--finalize <id> --batch ${{ github.run_id }}` — sets claude_cleared = all three sub-flags.
                  A lead only becomes send-eligible when all three pass.

            3. If you find a SYSTEMIC engine gap (a class of bug behind a failed check, not a one-off lead), append
               it to ops/CLAUDE-GAP-LEDGER.md (one section per gap: gap, root-cause, the fix, the fixture that locks
               it) and open a PR with the fix. Do NOT edit the off-limits Neon table families. Additive only.

            Add `--dry` to every batch command if the dry flag above is "true".
            The batch tool writes ONLY leads.claude_* columns. Touch nothing else.

      # 3) GRACEFUL DEGRADE GUARD. Runs ONLY when the Claude review step above actually ran and FAILED
      #    (env.HAS_OAUTH=='true' AND steps.claude.outcome=='failure'). It fetches the failed step's log and
      #    inspects it:
      #      • If the failure is the App-absent case ("not installed" / 401 / "install" the GitHub App), this is a
      #        one-time FOUNDER ACTION, not a code bug. We run the degraded pull-and-log floor (--pull ONLY — we do
      #        NOT clear any leads; clearing requires the real Claude review, so the safety gate is preserved), post
      #        ONE Telegram alert telling the founder to install https://github.com/apps/claude, and exit 0 so the
      #        job is GREEN (no red failure email).
      #      • If the failure is ANYTHING ELSE (genuine breakage), we re-raise (exit 1) so the existing
      #        "Notify on failure" step still fires and the run goes red — we only swallow the known App-absent case.
      - name: Graceful degrade if Claude Code GitHub App not installed
        if: ${{ env.HAS_OAUTH == 'true' && steps.claude.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BATCH_MAX: ${{ github.event.inputs.batch_max || '200' }}
          # Make sure the install alert actually goes out live, not just into the silent digest.
          NOTIFY_REALTIME: "1"
        run: |
          set -uo pipefail
          # Load .env so the batch tool + notifier have NEON_URL / TELEGRAM_* (decoded from ENV_B64 earlier).
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true

          # Determine whether this is a known-transient failure (App absent, service unavailable, rate-limit)
          # or a genuine code bug. Only genuine code bugs should make the job red.
          # Fail-open: if we cannot fetch/parse the log, default to transient (green) rather than red email.
          TRANSIENT=1
          LOG="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/logs" 2>/dev/null > /tmp/cs_logs.zip && unzip -p /tmp/cs_logs.zip 2>/dev/null || true)"
          if [ -n "$LOG" ]; then
            if echo "$LOG" | grep -qiE 'not installed on this repository|Claude Code is not installed|github.com/apps/claude|\b401\b.*(install|claude)|(install|claude).*\b401\b|operation failed after [0-9]+ attempts|rate.?limit|429|service unavailable|5[0-9][0-9]|ETIMEDOUT|ECONNRESET|connect ECONNREFUSED'; then
              TRANSIENT=1
            else
              TRANSIENT=0
            fi
          fi

          if [ "$TRANSIENT" != "1" ]; then
            echo "::error::claude-code-action failed for a reason that looks like a genuine code bug — re-raising so the run goes red." >&2
            echo "$LOG" | grep -iE 'error|fail|denied|forbidden' | tail -30 >&2 || true
            exit 1
          fi

          echo "::warning::claude-code-action failed with a transient/service error — running degraded pull-and-log floor (NO lead clearing), then exiting 0."

          # Degraded floor: pull-and-log ONLY. This is read-only (SELECT) and NEVER sets claude_cleared — the
          # Layer-3 send gate stays intact. Heartbeat-wrapped so engine_health still sees the run.
          echo "## Claude safeguard — DEGRADED (App not installed): pull-and-log only, NO clearing ($(date -u +%FT%TZ))" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          node scripts/heartbeat.js wrap claude-safeguard -- \
            node scripts/claude-safeguard-batch.js --pull "$BATCH_MAX" | tee -a "$GITHUB_STEP_SUMMARY" \
            || node scripts/claude-safeguard-batch.js --pull "$BATCH_MAX" | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # ONE clear founder alert (fail-open — the notifier can never fail this job).
          ALERT="claude-safeguard: claude-code-action had a transient failure (rate-limit or service unavailable) — degraded to pull-and-log this run. Layer-3 automated clearance continues; Claude review will resume next run."
          bash scripts/notify-telegram.sh "$ALERT" || true

          # Job stays GREEN — this is a one-time founder action, not a failure.
          exit 0

      # GAP #53: Alert when CLAUDE_CODE_OAUTH_TOKEN is not set → Layer-3 clears 0 every wave silently.
      # Fires on every run where the token is absent so the founder gets an actionable prompt.
      # Fail-open — the notifier can never fail this job.
      - name: Alert if no OAuth token (gap #53 — 0 clears per wave while token absent)
        if: ${{ env.HAS_OAUTH != 'true' }}
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          MSG="⚠️ claude-safeguard: CLAUDE_CODE_OAUTH_TOKEN is NOT set — Layer-3 clearance inactive, 0 leads cleared this wave. Founder action (one-time, £0): add repo secret CLAUDE_CODE_OAUTH_TOKEN via 'claude setup-token' then install https://github.com/apps/claude on this repo."
          bash scripts/notify-telegram.sh "$MSG" || true
          echo "::warning::CLAUDE_CODE_OAUTH_TOKEN not set — Layer-3 clearance inactive (gap #53)"

      # Self-heal: if any step above failed, post the REAL error to Telegram + Slack so the failure is
      # never silent. Reads creds from .env (decoded from ENV_B64 above). Fail-open + `|| true` — the
      # notifier can never itself fail the job.
      # NOTE: the claude-code-action step has continue-on-error, so its App-absent 401 does NOT trigger failure()
      # here — that case is handled (green) by the graceful-degrade guard above. This step still fires for any
      # genuine failure (including the guard re-raising on a non-App-absent claude-action error).
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/notify-workflow-failure.sh "${{ github.workflow }}" "${{ github.run_id }}" || true

