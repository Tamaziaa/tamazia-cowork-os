name: Mint now (drain minting_queue fast)
# Lightweight, on-demand minter for the cockpit Audit Search bar. Dispatched by the website's
# /api/admin/audits/mint after it enqueues a domain. Drains the WHOLE pending queue, so a batch of
# pasted URLs all mint in the first run; extra dispatches are cheap no-ops. Far faster + less failure-
# prone than dispatching the full engine cycle.
on:
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: mint-now
  cancel-in-progress: false   # queue back-to-back dispatches; never cancel a live mint
jobs:
  mint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install --omit=dev || npm install || true
      - run: python -m pip install --quiet -r requirements.txt
      - run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Drain the mint queue
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/ensure-schema.js || true
          node scripts/mint-worker.js --once
