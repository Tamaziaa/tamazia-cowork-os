name: Mint now (drain minting_queue fast)
# On-demand minter for the cockpit Audit Search bar AND scheduled fallback drain.
# Dispatched by /api/admin/audits/mint after enqueuing domains; also dispatched by mint-cycle.yml
# every 30 min as a safety net when the Oracle VM pm2 worker is slow or down.
# Drains the WHOLE pending queue in one run (--once exits when empty). Job timeout = 360 min
# (GH Actions max) so even a large batch of 200+ domains finishes without being SIGKILLed.
# Prior to this fix the 15-min timeout killed workers mid-build leaving 'minting' zombies forever.
on:
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: mint-now
  cancel-in-progress: false   # queue back-to-back dispatches; never cancel a live mint
jobs:
  mint:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # Per-build cap: PSI fix (PR #138) bounds scanSite at 90s; compliance + formatters add ~60s.
      # 3 min is a safe ceiling. Previous 5-min cap let a single slow site hold up the batch.
      MINT_BUILD_TIMEOUT_MS: "180000"
      # Reclaim zombie 'minting' rows left by any worker killed >16 min ago. Set below the old 30 min
      # default so that zombies from a previously killed GH Actions job (any run that used the old
      # 15-min timeout) are cleaned up immediately at the start of this run.
      MINT_RECLAIM_AFTER_MIN: "16"
      # Push concurrency to 15: with 3-min build cap, 15 concurrent = 300 audits/hour from GH Actions.
      MINT_CONCURRENCY: "15"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install --omit=dev || npm install || true
      - run: python -m pip install --quiet -r requirements.txt
      - run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Drain the mint queue
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/ensure-schema.js || true
          node scripts/mint-worker.js --once --reclaim-startup
