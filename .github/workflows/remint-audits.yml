name: Re-mint audits (manual)
# Re-mints every existing audit_pages row onto the current engine payload (word-level quotes, AI-citation
# table, data-viz inputs, public-archive fallback). Server-side so PageSpeed runs with the key and there is
# no shell time cap. Resumable + per-row fail-soft; safe to re-run.
on:
  workflow_dispatch:
    inputs:
      hashes:
        description: "comma-separated audit hashes to re-mint (blank = all stale)"
        required: false
        default: ""

concurrency:
  group: remint-audits
  cancel-in-progress: false

jobs:
  remint:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - name: ENV_B64 lint
        env:
          ENV_B64: ${{ secrets.ENV_B64 }}
        run: bash scripts/lint-env.sh || true
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps (pg8000 for DB shim)
        run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env from secret
        run: |
          echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
          if ! grep -q '^PAGESPEED_API_KEY=' .env && [ -n "${{ secrets.PAGESPEED_API_KEY }}" ]; then
            echo "PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}" >> .env
          fi
          if ! grep -q '^OPENPAGERANK_API_KEY=' .env && [ -n "${{ secrets.OPENPAGERANK_API_KEY }}" ]; then
            echo "OPENPAGERANK_API_KEY=${{ secrets.OPENPAGERANK_API_KEY }}" >> .env
          fi
      - name: Re-mint all stale audit rows
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          export REMINT_HASHES="${{ inputs.hashes }}"
          # A4/IG2: heartbeat-wrap so this long server-side re-mint is visible in engine_runs
          # (engine_health / check-stuck-jobs). Fallback to a bare call so a heartbeat hiccup never blocks the re-mint.
          # This job legitimately runs for hours (timeout-minutes: 350), so lift the wrap's hung-step guard above the
          # job timeout — otherwise heartbeat.js' 20-min default would SIGKILL a healthy long re-mint at exit 124.
          export HEARTBEAT_WRAP_TIMEOUT_MS=21600000   # 6h, comfortably over the 350-min job cap
          node scripts/heartbeat.js wrap remint-audits -- node scripts/remint-audits.js || node scripts/remint-audits.js
