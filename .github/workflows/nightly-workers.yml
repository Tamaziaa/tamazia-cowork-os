# CC-4 nightly workers · recycle + reconcile. NO sending (send-due is not here; system_state.paused
# also gates). Keeps Neon in sync with Mystrika + cal.com + the audit pages, and recycles non-repliers.
name: Nightly workers (recycle + reconcile)

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC daily
  workflow_dispatch:

concurrency:
  group: engine-db-work
  cancel-in-progress: false

jobs:
  workers:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Node deps
        run: npm install --omit=dev || npm install || true
      - name: Install Python deps (pg8000 for DB shim)
        run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Schema provision (idempotent)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/ensure-schema.js
          node scripts/cc2-provision.js
      - name: Reconcile + recycle (Neon <-> Mystrika <-> cal <-> audits, then recycle)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          # One heartbeat spanning the bundle: recycle.js re-tiers leads back to lifecycle_stage='qualified', and
          # reconcile.js flips leads to 'booked' — both write the tier/lifecycle columns the engine cycle's seam
          # reads. Wrapping them keeps nightly-workers visible to the engine-cycle race guard (heartbeat.js
          # active-writer) for its whole DB-write window, so the cycle skips its racy steps throughout.
          # P5 [X2/X8]: governor-release.js was REMOVED from this bundle — it now runs as its OWN engine-cycle
          # step every 30 min (scripts/run-engine-cycle.sh), so it no longer depends on this single 60-min job
          # that was timing out (which is why governor_released_at was 0 on every lead). verify-audits.js likewise
          # runs as its own cycle step now. This bundle keeps only the genuinely-nightly reconcile/recycle/scorecard.
          node scripts/heartbeat.js wrap nightly-workers -- bash -c '
            node scripts/reconcile.js || true
            node scripts/recycle.js   || true
            node scripts/scorecard-nightly.js || true
          '
      - name: Compute nightly metrics (per-source + per-pipeline deliverability/cost -> metrics table)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          # P3-5: aggregate sends/bounce_events/inbound_emails/lead_sources/leads into the `metrics` table,
          # idempotent per metric_date. Read-mostly (only writes the metrics table, not lead tier columns) so it
          # is NOT a re-tier writer and gets its OWN heartbeat job name (not nightly-workers / not guarded).
          # Fail-open by construction; the || true is belt-and-braces so a metrics hiccup never reds the workflow.
          node scripts/heartbeat.js wrap compute-metrics -- node scripts/compute-metrics.js || true
      - name: Health check (Z17-08 — wire the orphaned health-check.js)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          # Z17-08: health-check.js was never attached to a workflow, so the health row went 51h stale.
          # Run it nightly, fail-open (|| true) so a probe hiccup never reds the workflow; it self-alerts
          # to Telegram/Slack on _overall=fail. Cheap, high-value observability (no writes beyond health row).
          node scripts/heartbeat.js wrap health-check -- node scripts/health-check.js || true
      - name: Backfill entity_type (GAP-LEDGER #34 — 8,617 NULL entity_type leads)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          # Classify entity_type IS NULL leads from company name heuristic (additive, protect predicate:
          # consent_required IS NOT TRUE, mystrika_pushed_at IS NULL, governor_released_at IS NULL,
          # audit_url_minted_at IS NULL — never re-flags sent/minted/released leads). Limit 3000/night.
          # Fail-open so a classification hiccup never reds the workflow.
          node scripts/heartbeat.js wrap entity-type-backfill -- node scripts/backfill-entity-type.js || true
