# CC-4 nightly workers · recycle + reconcile. NO sending (send-due is not here; system_state.paused
# also gates). Keeps Neon in sync with Mystrika + cal.com + the audit pages, and recycles non-repliers.
name: Nightly workers (recycle + reconcile)

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC daily
  workflow_dispatch:

concurrency:
  group: engine-db-work
  cancel-in-progress: false

jobs:
  workers:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node deps
        run: npm install --omit=dev || npm install || true
      - name: Install Python deps (pg8000 for DB shim)
        run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Schema provision (idempotent)
        run: |
          set -a; source .env; set +a
          node scripts/ensure-schema.js
          node scripts/cc2-provision.js
      - name: Reconcile (Neon <-> Mystrika <-> cal <-> audits)
        run: |
          set -a; source .env; set +a
          node scripts/heartbeat.js wrap nightly-workers -- node scripts/reconcile.js || true
      - name: Recycle (non-repliers -> 90d, repliers -> suppression)
        run: |
          set -a; source .env; set +a
          node scripts/recycle.js || true
