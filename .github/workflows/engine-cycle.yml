name: Tamazia engine cycle (24/7, free)
# Runs the full engine cycle on GitHub's runners every 30 min — no server to maintain.
# Self-healing: each run is isolated; a crash never wedges the schedule, the next tick runs clean.
# Deps: Node (built-ins) + Python pg8000 for the Postgres shim (scripts/lib/psql-shim.py).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: engine-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Node deps
        run: npm install --omit=dev || npm install || true
      - name: Install Python deps (pg8000 for DB shim)
        run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env from secret
        run: |
          echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
          if ! grep -q '^PAGESPEED_API_KEY=' .env && [ -n "${{ secrets.PAGESPEED_API_KEY }}" ]; then
            echo "PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}" >> .env
          fi
      - name: Run engine cycle
        run: |
          bash scripts/run-engine-cycle.sh
          echo "===== engine-cycle.log (last 150 lines, surfaced for audit) ====="
          tail -n 150 logs/engine-cycle.log 2>/dev/null || echo "(no engine-cycle.log produced)"
      - name: Alert on failure
        if: failure()
        run: |
          MSG="🔴 GitHub Actions engine cycle failed (run ${{ github.run_id }}). Check the Actions tab."
          set +e
          source .env 2>/dev/null
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" -d text="$MSG" >/dev/null
          fi
