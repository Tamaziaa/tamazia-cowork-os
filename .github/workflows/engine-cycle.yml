name: Tamazia engine cycle (24/7, free)
# Runs the full engine cycle on GitHub's runners every 30 min — no server to maintain.
# Self-healing: each run is isolated; a crash never wedges the schedule, the next tick runs clean.
# Deps: Node (built-ins) + Python pg8000 for the Postgres shim (scripts/lib/psql-shim.py).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# OWN concurrency group (NOT engine-db-work). engine-cycle used to share engine-db-work with the heavy
# re-tier writers (v3-rerun ~330min / backlog-burst / nightly-workers) to stop requalify-all-leads.js
# re-tiering (icp_tier / quality_fit / lifecycle_stage / sector_code) the very rows this cycle's
# qualify->enqueue->mint->render seam reads — BUT that queued every 30-min schedule behind a multi-hour
# writer, and GitHub then CANCELLED the superseded pending cycles ("cancelled" runs that alarm the founder).
# Fix: each cycle is short (per-step STEP_TIMEOUT + 25-min job cap => <30min), so its OWN group with
# cancel-in-progress:false lets back-to-back schedules queue/finish cleanly with NO self-cancellation. The
# tier/lifecycle race is now protected at the DATA layer instead: run-engine-cycle.sh asks heartbeat.js
# `active-writer` for a live heavy writer and SKIPS just the race-sensitive steps that cycle (the writers
# keep engine-db-work among themselves). Same protection, zero cancellation/email noise. Do NOT move this
# back into engine-db-work.
concurrency:
  group: engine-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    # D3.2: throughput knobs — overridable via workflow_dispatch inputs or ENV_B64 secret.
    # Defaults match the shell-script fallbacks so behaviour is unchanged until a founder adjusts them.
    env:
      VERIFY_AUDITS_BATCH: '20'
      QUALIFY_BATCH: '50'
      ENQUEUE_BATCH: '30'
      STEP_TIMEOUT: '600'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Node deps
        run: npm install --omit=dev || npm install || true
      - name: Install Python deps (pg8000 for DB shim)
        run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env from secret
        run: |
          echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
          if ! grep -q '^PAGESPEED_API_KEY=' .env && [ -n "${{ secrets.PAGESPEED_API_KEY }}" ]; then
            echo "PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}" >> .env
          fi
          if ! grep -q '^OPENPAGERANK_API_KEY=' .env && [ -n "${{ secrets.OPENPAGERANK_API_KEY }}" ]; then
            echo "OPENPAGERANK_API_KEY=${{ secrets.OPENPAGERANK_API_KEY }}" >> .env
          fi
      - name: Run engine cycle
        run: |
          bash scripts/run-engine-cycle.sh
          echo "===== engine-cycle.log (last 150 lines, surfaced for audit) ====="
          tail -n 150 logs/engine-cycle.log 2>/dev/null || echo "(no engine-cycle.log produced)"
      - name: Alert on failure
        if: failure()
        run: |
          MSG="🔴 GitHub Actions engine cycle failed (run ${{ github.run_id }}). Check the Actions tab."
          set +e
          source .env 2>/dev/null
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s --max-time 15 -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" -d text="$MSG" >/dev/null || true
          fi
