name: Tamazia engine cycle (24/7, free)
# Runs the full engine cycle on GitHub's runners every 30 min — no server to maintain.
# Self-healing: each run is isolated; a crash never wedges the schedule, the next tick runs clean.
# To activate: push this repo to GitHub (private), add the two secrets below, done.
#   Settings -> Secrets and variables -> Actions:
#     ENV_B64   = base64 of your full .env  (one secret holds every key; nothing in plaintext here)
#     (optional) SLACK_WEBHOOK for failure alerts if you don't want to read it from .env
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (GitHub may delay under load; fine for this workload)
  workflow_dispatch: {}        # lets you trigger a run by hand from the Actions tab

concurrency:
  group: engine-cycle
  cancel-in-progress: false    # never run two cycles at once; queue instead

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install --omit=dev || npm install || true
      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Run engine cycle
        run: bash scripts/run-engine-cycle.sh
      - name: Alert on failure
        if: failure()
        run: |
          MSG="🔴 GitHub Actions engine cycle failed (run ${{ github.run_id }}). Check the Actions tab."
          # Telegram (reads token+chat from the decoded .env)
          set +e
          source .env 2>/dev/null
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" -d text="$MSG" >/dev/null
          fi
