name: Notify daily digest (structured engine report)
# Posts ONE structured Telegram + Slack message at 07:00 UTC with live pipeline stats.
# Distinct from daily-digest.yml (which buckets raw notifications table entries).
# This workflow queries Neon directly for department-level KPIs and sends a clean summary.
on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch: {}

# Single-flight: manual dispatch must not race the cron (double-send).
concurrency:
  group: notify-daily-digest
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --quiet -r requirements.txt
      - run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Post daily engine report
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/daily-report.js
