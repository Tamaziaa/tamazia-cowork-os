name: Apollo contact enrichment (priority sectors)
# Apollo is PERMANENTLY REMOVED (founder decision 2026-06-19). APOLLO_KEY is not in ENV_B64;
# the script exits 0 immediately when the key is absent. The daily schedule was removed to stop
# wasting a workflow slot every morning. workflow_dispatch kept for historical manual dispatch only.
on:
  workflow_dispatch:
    inputs:
      max:
        description: 'Max leads to enrich per run (default 100)'
        required: false
        default: '100'

permissions:
  contents: read

concurrency:
  group: apollo-enrich
  cancel-in-progress: false

jobs:
  apollo-enrich:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: ENV_B64 lint
        env:
          ENV_B64: ${{ secrets.ENV_B64 }}
        run: bash scripts/lint-env.sh || true
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - name: Install Node deps
        run: npm install --no-audit --no-fund || npm install || true
      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Apollo contact enrichment (priority sectors)
        continue-on-error: true
        env:
          APOLLO_MAX: ${{ github.event.inputs.max || '100' }}
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/apollo-enrich.js --max "$APOLLO_MAX" || true
