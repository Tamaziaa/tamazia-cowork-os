name: Ahrefs domain rating enrichment
# Pulls domain_rating, organic_traffic from Ahrefs Site Explorer v3 for domains that have never
# been checked or were checked more than 30 days ago. Writes results back to leads (additive columns).
#
# KILL SWITCH: AHREFS_KEY must be set in ENV_B64. If absent the script exits 0 with a log notice.
# Limit: 200 domains per run. Fail-open: Ahrefs API error = skip domain + move on.
on:
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC daily
  workflow_dispatch:
    inputs:
      max:
        description: 'Max domains to check per run (default 200)'
        required: false
        default: '200'

permissions:
  contents: read

concurrency:
  group: engine-db-work
  cancel-in-progress: false

jobs:
  ahrefs-enrich:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - name: Install Node deps
        run: npm install --no-audit --no-fund || npm install || true
      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Ahrefs domain rating enrichment
        continue-on-error: true
        env:
          AHREFS_MAX: ${{ github.event.inputs.max || '200' }}
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/ahrefs-enrich.js --max "$AHREFS_MAX" || true
