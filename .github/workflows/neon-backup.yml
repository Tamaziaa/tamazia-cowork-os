name: Neon backup (Z27-01 · daily pg_dump -> R2 + branch)
on:
  schedule:
    - cron: '15 3 * * *'    # 03:15 UTC — clear of every existing cron (engine */30, nightly 02:30, llm-rescue :23, etc.)
  workflow_dispatch: {}
concurrency:
  group: neon-backup
  cancel-in-progress: false
permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install Node deps
        run: npm install --omit=dev || npm install || true
      - name: Install Python deps (pg8000 for logging shim)
        run: python -m pip install --quiet -r requirements.txt
      # FIX (2026-06-23): materialise .env BEFORE any Neon step. Old order ran ensure-schema with no .env,
      # so backup_runs was never provisioned -> 42P01 tracebacks.
      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Install postgresql-client-17 (pg_dump MUST match Neon server v17.x; ubuntu-24.04 default v16 -> "server version mismatch")
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version
      - name: Ensure backup_runs table exists (additive, idempotent — guaranteed off-shim via libpq v17)
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/ensure-schema.js || true
          if [ -n "$NEON_URL" ]; then
            /usr/lib/postgresql/17/bin/psql "$NEON_URL" -c "CREATE TABLE IF NOT EXISTS backup_runs (id bigserial PRIMARY KEY, kind text, status text, detail text, bytes bigint, ran_at timestamptz DEFAULT now());" || true
          fi
      - name: Run backup
        run: |
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          node scripts/neon-backup.js
      - name: Alert on failure
        if: failure()
        run: |
          set +e; source .env 2>/dev/null
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s --max-time 15 -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" -d text="🔴 Neon backup workflow FAILED (run ${{ github.run_id }}) — SoT has NO fresh off-site copy. Check Actions." >/dev/null || true
          fi
