name: Mystrika sync + push (gated)
# Reply-sync (poll prospect statuses -> Neon) on a schedule; push (FIT leads -> campaign) on manual dispatch
# after warmup. Gated on MYSTRIKA_API_KEY (in ENV_B64). Self-healing.
on:
  schedule:
    - cron: "0 */6 * * *"   # reply-sync every 6h
  workflow_dispatch:
    inputs:
      action: { description: "sync | push", default: "sync" }
      campaign: { description: "campaign_id (for push)", default: "" }
      max: { description: "max prospects (push)", default: "200" }
concurrency: { group: mystrika, cancel-in-progress: false }
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --quiet -r requirements.txt
      - name: Materialise .env
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Run
        run: |
          while IFS= read -r _l; do case "$_l" in '#'*|'') ;; *=*) export "$_l" 2>/dev/null || true ;; esac; done < .env 2>/dev/null || true
          if [ "${{ github.event.inputs.action }}" = "push" ]; then node scripts/push-to-mystrika.js --campaign "${{ github.event.inputs.campaign }}" --max "${{ github.event.inputs.max || '200' }}";
          else
            # Scheduled run = (1) reply-sync, THEN (2) the CAPACITY-AWARE DRAIN. The drain keeps every sector
            # campaign topped to a buffer of unsent prospects (MYSTRIKA_BUFFER_DAYS x the warmed daily cap), pulling
            # from the DB ready-pool (claude_cleared + audit_verified + not pushed). It SELF-GATES on SEND_ENABLED:
            # with SEND off it computes + logs the plan but loads NOTHING into Mystrika, so it is safe to run on the
            # schedule today and becomes the live drain the instant the founder flips SEND_ENABLED. No new credential.
            node scripts/heartbeat.js wrap mystrika -- bash -c '
              node scripts/sync-mystrika-replies.js && node scripts/plane-leads-sync.js
              node scripts/push-to-mystrika.js --max "${MYSTRIKA_DRAIN_MAX:-500}"
            ';
          fi
