name: Oracle A1 Ampere — auto-acquire (retry until capacity)
# Polls every 10 minutes until VM.Standard.A1.Flex becomes available in uk-london-1.
# Oracle free tier A1 capacity is released sporadically — this catches it.
# Once the instance is created it posts a Telegram notification and disables itself.
#
# REQUIRED GITHUB SECRETS (add under tamazia-cowork-os → Settings → Secrets):
#   OCI_CLI_USER          — OCID of your OCI user (ocid1.user.oc1..xxx)
#   OCI_CLI_FINGERPRINT   — API key fingerprint (xx:xx:xx:...)
#   OCI_CLI_TENANCY       — OCID of your tenancy (ocid1.tenancy.oc1..xxx)
#   OCI_CLI_REGION        — uk-london-1
#   OCI_CLI_KEY_CONTENT   — PEM private key content (the API signing key)
#   OCI_SUBNET_ID         — OCID of the subnet to place the instance in
#   OCI_IMAGE_ID          — Canonical Ubuntu 22.04 aarch64 image OCID for uk-london-1
#
# HOW TO GET THESE:
#   1. Oracle Cloud Console → top-right profile → User Settings → API Keys → Add API Key
#      (generate a new RSA key pair, download private key, copy fingerprint)
#   2. OCI_CLI_USER: Profile → User OCID (copy button)
#   3. OCI_CLI_TENANCY: Profile → Tenancy OCID
#   4. OCI_SUBNET_ID: Networking → VCNs → your VCN → Subnets → copy OCID of public subnet
#   5. OCI_IMAGE_ID: Compute → Images → Platform Images → filter "Canonical Ubuntu 22.04 aarch64" → copy OCID
#
# DISABLE: Once instance is created, delete this workflow or comment out the cron trigger.

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:
    inputs:
      ocpus:
        description: 'Number of OCPUs (max 4 on free tier)'
        default: '4'
      memory_gb:
        description: 'Memory in GB (max 24 on free tier)'
        default: '24'

jobs:
  acquire-a1:
    runs-on: ubuntu-latest
    name: Try to acquire A1.Flex instance
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet 2>&1 | tail -3 || true

      - name: Check if instance already exists
        id: check
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
        run: |
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_CLI_USER" "$OCI_CLI_FINGERPRINT" "$OCI_CLI_TENANCY" "$OCI_CLI_REGION" "~/.oci/key.pem" > ~/.oci/config
          printf '%s' "$OCI_CLI_KEY_CONTENT" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          EXISTING=$(oci compute instance list \
            --compartment-id "$OCI_CLI_TENANCY" \
            --display-name "tamazia-engine-a1" \
            --lifecycle-state RUNNING \
            --query "data[0].\"public-ip\"" \
            --raw-output 2>/dev/null || echo "")
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Instance already RUNNING at $EXISTING"
            echo "ALREADY_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "ALREADY_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Try each Availability Domain
        if: steps.check.outputs.ALREADY_EXISTS == 'false'
        continue-on-error: true
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCPUS: ${{ github.event.inputs.ocpus || '4' }}
          MEMORY_GB: ${{ github.event.inputs.memory_gb || '24' }}
        run: |
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_CLI_USER" "$OCI_CLI_FINGERPRINT" "$OCI_CLI_TENANCY" "$OCI_CLI_REGION" "~/.oci/key.pem" > ~/.oci/config
          printf '%s' "$OCI_CLI_KEY_CONTENT" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem

          set +e  # Don't abort on oci CLI non-zero exit (capacity errors return exit 1)
          SUCCESS=false
          for AD in "HzzF:UK-LONDON-1-AD-1" "HzzF:UK-LONDON-1-AD-2" "HzzF:UK-LONDON-1-AD-3"; do
            echo "Trying $AD ..."
            RESULT=$(oci compute instance launch \
              --availability-domain "$AD" \
              --compartment-id "$OCI_CLI_TENANCY" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config "{\"ocpus\": $OCPUS, \"memoryInGBs\": $MEMORY_GB}" \
              --image-id "$OCI_IMAGE_ID" \
              --subnet-id "$OCI_SUBNET_ID" \
              --display-name "tamazia-engine-a1" \
              --assign-public-ip true \
              --metadata '{"ssh_authorized_keys":""}' \
              2>&1)
            EXIT_CODE=$?
            echo "Exit code: $EXIT_CODE | Response: $(echo "$RESULT" | head -c 300)"
            if echo "$RESULT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
              PUBLIC_IP=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('public-ip','pending'))" 2>/dev/null || echo "pending")
              echo "SUCCESS on $AD — IP: $PUBLIC_IP"
              echo "INSTANCE_AD=$AD" >> $GITHUB_ENV
              echo "INSTANCE_IP=$PUBLIC_IP" >> $GITHUB_ENV
              SUCCESS=true
              break
            else
              echo "No capacity on $AD — trying next"
            fi
          done
          set -e

          if [ "$SUCCESS" = "false" ]; then
            echo "All ADs at capacity — will retry on next cron tick (every 10 min)"
            exit 0
          fi

      - name: Notify on success
        if: env.INSTANCE_IP != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="Oracle A1 Ampere CREATED on $INSTANCE_AD — IP: $INSTANCE_IP (4 OCPU / 24GB). Run bootstrap script: bash ops/searxng-setup.sh"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}"
          fi
          echo "$MSG"
          # Log to workflow summary
          echo "## Oracle A1 Created" >> $GITHUB_STEP_SUMMARY
          echo "- **AD:** $INSTANCE_AD" >> $GITHUB_STEP_SUMMARY
          echo "- **IP:** $INSTANCE_IP" >> $GITHUB_STEP_SUMMARY
          echo "- **Next:** Run \`bash ops/searxng-setup.sh\` on new VM, update SEARXNG_URL in ENV_B64" >> $GITHUB_STEP_SUMMARY
