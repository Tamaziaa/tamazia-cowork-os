name: Neon schema guard (drift alert)
on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC
  workflow_dispatch:
jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # bound a hung Neon HTTP call so the drift-guard can't pin a runner for the 6h default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Materialise .env from secret
        run: echo "${{ secrets.ENV_B64 }}" | base64 -d > .env
      - name: Check Neon schema drift (code refs vs live)
        run: |
          set -a; source .env 2>/dev/null; set +a
          node scripts/heartbeat.js wrap neon-guard -- node scripts/ensure-schema.js --check
      - name: Alert on drift
        if: failure()
        run: |
          set +e
          source .env 2>/dev/null
          MSG="🟠 Neon schema drift: code expects tables/columns not in the DB. ensure-schema --apply heals it next cycle. Run ${{ github.run_id }}."
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s --max-time 15 -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" -d chat_id="$TELEGRAM_CHAT_ID" -d text="$MSG" >/dev/null || true
          fi
