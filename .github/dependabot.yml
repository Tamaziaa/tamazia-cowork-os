version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: "scope"
# NOTE (2026-06-23): github-actions ecosystem removed — its updater errors while parsing the 2 legacy
# malformed one-shots (rebuild-env-b64.yml / update-env-secret.yml). Re-add once those are fixed.
